{% extends "base.html" %}
{% block content %}
<h2>Login</h2>

<form method="POST" class="form-grid">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Passwort" required>
    <div class="actions">
      <button type="submit">Login</button>
    </div>
</form>
{% endblock %}
